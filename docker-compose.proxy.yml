# v402 reverse-proxy example: protect an EXISTING origin without touching it.
#
#   FACILITATOR_AUTH_TOKEN=… V402_CANONICAL_DOMAIN=api.example.com \
#     docker compose -f docker-compose.proxy.yml up --build
#
# Stack: origin (traefik/whoami as a stand-in for your app) ← v402-proxy
# (payment guard, port 8402) → facilitator (verify/reserve/commit, port 3000).
# Route pricing lives in docker/proxy-rules.example.json — mount your own.
#
# The facilitator MUST advertise the same canonicalDomain/payTo the proxy
# advertises: it rebuilds the signed canonical payload from ITS config.

services:
  facilitator:
    build:
      context: .
      dockerfile: docker/facilitator.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      DB_PATH: /data/v402.sqlite
      VERUS_RPC_URL: ${VERUS_RPC_URL:-http://127.0.0.1:18843}
      VERUS_RPC_USER: ${VERUS_RPC_USER:-}
      VERUS_RPC_PASS: ${VERUS_RPC_PASS:-}
      V402_CHAIN: ${V402_CHAIN:-vrsctest}
      V402_PAY_TO: ${V402_PAY_TO:-v402-facilitator@}
      V402_CANONICAL_DOMAIN: ${V402_CANONICAL_DOMAIN:?advertised domain, e.g. api.example.com}
      V402_WATCHER_MODE: ${V402_WATCHER_MODE:-real}
      FACILITATOR_AUTH_TOKEN: ${FACILITATOR_AUTH_TOKEN:?operator-provisioned middleware token}
    volumes:
      - v402-proxy-data:/data
    restart: unless-stopped

  origin:
    # stand-in for the app being protected — swap for your real origin
    image: traefik/whoami:v1.10
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: docker/proxy.Dockerfile
    ports:
      - "8402:8402"
    environment:
      V402_PROXY_UPSTREAM: http://origin:80
      # URL the proxy CALLS (in-cluster) vs the one advertised to clients
      FACILITATOR_URL: http://facilitator:3000
      FACILITATOR_PUBLIC_URL: ${FACILITATOR_PUBLIC_URL:-http://localhost:3000}
      FACILITATOR_AUTH_TOKEN: ${FACILITATOR_AUTH_TOKEN:?operator-provisioned middleware token}
      V402_CANONICAL_DOMAIN: ${V402_CANONICAL_DOMAIN:?advertised domain, e.g. api.example.com}
      V402_NETWORK: ${V402_CHAIN:-vrsctest}
      V402_ASSET: ${V402_ASSET:-VRSCTEST}
      V402_PAY_TO: ${V402_PAY_TO:-v402-facilitator@}
    volumes:
      - ./docker/proxy-rules.example.json:/rules/rules.json:ro
    depends_on:
      facilitator:
        condition: service_healthy
      origin:
        condition: service_started
    restart: unless-stopped

volumes:
  v402-proxy-data:
