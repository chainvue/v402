# Release — automated via multi-semantic-release (Conventional Commits).
#
# Zero-touch monorepo release: every push to `main` runs multi-semantic-release,
# which runs semantic-release per package. For each package it analyzes the
# commits that touched it since the package's last `<name>@<version>` tag and,
# if releasable (feat → minor, fix → patch; a BREAKING change stays 0.x → minor
# per .releaserc.json releaseRules), computes the next version, updates that
# package's package.json + CHANGELOG.md, publishes, tags, and creates a GitHub
# release. Dependent packages get a patch bump to pick up the new dependency
# versions. Private packages (apps/demo-server) are skipped. No releasable
# commits → no-op. Preview with the workflow_dispatch dry-run.
#
# Publish: semantic-release owns versioning only; the actual publish is the
# proven OIDC `pnpm publish` (exec plugin), per package — @semantic-release/npm
# runs npmPublish:false so no NPM token is needed; provenance via id-token:write.
# The one-time trusted-publisher registration (per package, repo chainvue/v402,
# workflow release.yml) still applies.
#
# CUTOVER (one-time): push the per-package baseline tags (`<name>@<version>` at
# the last-published version) BEFORE the first main push, or every package is
# treated as a first release and jumps to 1.0.0. --sequential-init serializes
# per-package initialization to avoid collisions.
#
# Security: this job holds id-token:write (npm publish rights). Actions are
# SHA-pinned (tag-hijack defense); token scope is least-privilege (contents +
# id-token; github-plugin comments/labels disabled in .releaserc.json). `main`
# must let GITHUB_TOKEN push the per-package release commits + tags.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: compute per-package versions + notes, but do not publish or tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # semantic-release pushes per-package release commits + tags
      id-token: write # OIDC token for npm trusted publishing (provenance)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # full history + tags: semantic-release needs them

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Release
        run: >-
          pnpm exec multi-semantic-release
          --ignore-private-packages --sequential-init
          ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  smoke:
    needs: release
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          # This job is npm-only; without this, setup-node sees the workspace
          # packageManager field and demands a pnpm binary for its cache.
          package-manager-cache: false

      - name: From-registry install smoke
        run: node scripts/registry-install-smoke.mjs
