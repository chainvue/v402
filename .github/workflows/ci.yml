# CI — build, typecheck, test on every push and PR.
#
# Notes:
# - pnpm comes from pnpm/action-setup, which reads the root `packageManager`
#   field — the single source of truth for the pnpm version. corepack is not
#   bundled with Node 25+ (see docs/RISKS.md, Layer 5), so we never rely on it.
# - Build runs BEFORE typecheck/test: workspace packages resolve each other
#   through their published entry points (`dist/`), so a fresh checkout has
#   nothing to typecheck or test against until `pnpm build` has run.
# - Integration suites gated behind VERUS_RPC_URL skip automatically — CI has
#   no Verus node. The real-RPC signature path (verifymessage) therefore CANNOT
#   run in CI without a verusd; it is exercised only in local/staging with
#   VERUS_RPC_* set. Vector parity runs as part of the normal suite.
# - Node matrix covers the `engines.node` floor (22) and a current release
#   (26); the cross-process SQLite serialization test needs a real Node
#   subprocess and runs on both.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 26]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage threshold)
        run: pnpm test:coverage

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Fail on known-vulnerable dependencies (custody service — supply chain
      # is in scope). Moderate+ only, to avoid noise from low-severity advisories
      # in dev-only tooling; raise to `low` once the tree is clean.
      - name: Audit dependencies
        run: pnpm audit --audit-level moderate --prod

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Scan the full history for committed secrets (admin tokens, WIFs, RPC
      # credentials). Runs on PRs and pushes; the action fails the job on a
      # verified finding.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
