# CI — build, typecheck, test on every push and PR.
#
# Notes:
# - pnpm comes from pnpm/action-setup, which reads the root `packageManager`
#   field — the single source of truth for the pnpm version. corepack is not
#   bundled with Node 25+ (see docs/RISKS.md, Layer 5), so we never rely on it.
# - Build runs BEFORE typecheck/test: workspace packages resolve each other
#   through their published entry points (`dist/`), so a fresh checkout has
#   nothing to typecheck or test against until `pnpm build` has run.
# - Integration suites gated behind VERUS_RPC_URL skip automatically — CI has
#   no Verus node. The real-RPC signature path (verifymessage) therefore CANNOT
#   run in CI without a verusd; it is exercised only in local/staging with
#   VERUS_RPC_* set. Vector parity runs as part of the normal suite.
# - Node matrix covers the `engines.node` floor (22) and a current release
#   (26); the cross-process SQLite serialization test needs a real Node
#   subprocess and runs on both.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 26]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage threshold)
        run: pnpm test:coverage

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # Dependency vulnerability scan via OSV (osv.dev), reading pnpm-lock.yaml
      # directly — custody service, supply chain is in scope. Replaces
      # `pnpm audit`, whose npm quick-audit endpoint npm retired (HTTP 410).
      # osv-scanner is free + maintained by Google and fails the job on a
      # known-vulnerable dependency. The release lookup is token-authenticated
      # to dodge the unauthenticated GitHub API rate limit.
      - name: Audit dependencies (osv-scanner)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/google/osv-scanner/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]*osv-scanner[^"]*linux_amd64"' \
            | sed -E 's/.*"(https[^"]+)".*/\1/' | head -1)"
          curl -fsSL "$url" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Full-history secret scan (admin tokens, WIFs, RPC credentials). Uses the
      # free gitleaks CLI binary directly: the gitleaks GitHub Action now
      # requires a paid GITLEAKS_LICENSE for orgs, but the CLI itself stays
      # MIT/free. Fails the job on any finding.
      - name: Secret scan (gitleaks CLI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]*linux_x64\.tar\.gz"' \
            | sed -E 's/.*"(https[^"]+)".*/\1/' | head -1)"
          curl -fsSL "$url" | tar -xzf - gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
