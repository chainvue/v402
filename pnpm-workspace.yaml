packages:
  - "packages/*"
  - "apps/*"

# pnpm 10 ignores dependency build scripts unless explicitly approved.
# better-sqlite3 needs its install script (prebuild-install / node-gyp);
# esbuild's postinstall is a fallback validator — approved so a platform
# without a matching optional binary still gets a working esbuild.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild

# pnpm 10 switched `pnpm deploy` to an injected-workspace model; the Docker
# builds use the v9 deploy semantics (self-contained /out from --filter),
# which the images were verified with. Revisit if we ever want injected
# workspace packages.
forceLegacyDeploy: true
